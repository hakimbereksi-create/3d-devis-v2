<!doctype html>
<html>
<head>
    <title>🚀 HB3D Devis 3D Instantané</title>
    <style>
        /* 🎨 PALETTE HB3D ROUGE/VERT */
        :root {
            --rouge-hb3d: #DC2626;
            --vert-hb3d: #16A34A;
            --fond-card: rgba(255,255,255,0.95);
            --ombre: 0 20px 40px rgba(220,38,38,0.2);
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; 
            padding: 20px;
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* HEADER HB3D */
        .header {
            text-align: center; 
            color: white; 
            margin-bottom: 40px;
        }
        .header h1 { 
            font-size: 2.5em; 
            background: linear-gradient(45deg, var(--rouge-hb3d), var(--vert-hb3d));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        /* CARDS PRINCIPALES */
        .main-grid {
            display: grid; 
            grid-template-columns: 1fr 400px; 
            gap: 30px; 
            align-items: start;
        }
        
        .viewer-card, .form-card {
            background: var(--fond-card);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 30px;
            box-shadow: var(--ombre);
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }
        .viewer-card:hover, .form-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 30px 60px rgba(220,38,38,0.3);
        }
        
        /* VIEWER 3D */
        .viewer-section {
            text-align: center;
            margin-bottom: 20px;
        }
        #cv { 
            width: 100%; 
            height: 400px; 
            border-radius: 16px; 
            border: 3px solid rgba(220,38,38,0.2);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.1);
        }
        #loading {
            display: flex; align-items: center; justify-content: center;
            height: 400px; color: var(--rouge-hb3d);
            font-size: 1.2em;
        }
        
        /* UPLOAD ZONE */
        .upload-zone {
            border: 3px dashed var(--rouge-hb3d);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            background: rgba(220,38,38,0.05);
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .upload-zone:hover {
            background: rgba(220,38,38,0.1);
            border-color: var(--vert-hb3d);
        }
        #file { display: none; }
        
        /* FORMULAIRE HB3D */
        .form-group {
            margin-bottom: 24px;
        }
        .form-group h4 {
            color: var(--rouge-hb3d);
            margin-bottom: 12px;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-group label {
            display: block;
            margin: 8px 0;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .form-group input[type=radio]:checked + label,
        .form-group input[type=radio]:hover + label {
            background: var(--vert-hb3d);
            color: white;
        }
        
        /* CHAMPS */
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid rgba(220,38,38,0.2);
            border-radius: 12px;
            font-size: 1em;
            transition: all 0.3s;
            background: rgba(255,255,255,0.8);
        }
        .form-control:focus {
            outline: none;
            border-color: var(--vert-hb3d);
            box-shadow: 0 0 0 4px rgba(22,163,74,0.1);
        }
        
        /* BOUTON HB3D */
        #submit {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, var(--rouge-hb3d), var(--vert-hb3d));
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(220,38,38,0.4);
        }
        
        /* RESPONSIVE */
        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
            .viewer-card, .form-card { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 HB3D</h1>
            <p>Calculateur de Devis Impression 3D Instantané</p>
        </div>
        
        <div class="main-grid">
            <!-- VIEWER 3D -->
            <div class="viewer-card">
                <div class="upload-zone" onclick="document.getElementById('file').click()">
                    <label>📁 Glissez votre fichier STL ou cliquez ici</label>
                    <input type="file" id="file" accept=".stl">
                </div>
                <div class="viewer-section">
                    <canvas id="cv" width="400" height="400"></canvas>
                    <div id="loading">⏳ Chargement du modèle 3D...</div>
                </div>
            </div>
            
            <!-- FORMULAIRE -->
            <div class="form-card">
                <form id="form">
                    <div class="form-group">
                        <h4>🏭 Matériau</h4>
                        <label><input type="radio" name="material" value="PLA"> PLA</label>
                        <label><input type="radio" name="material" value="ABS"> ABS</label>
                        <label><input type="radio" name="material" value="PETG"> PETG</label>
                        <label><input type="radio" name="material" value="Résine"> Résine</label>
                    </div>
                    
                    <div class="form-group">
                        <h4>🎨 Couleur</h4>
                        <label><input type="radio" name="color" value="Blanc"> Blanc</label>
                        <label><input type="radio" name="color" value="Noir"> Noir</label>
                        <label><input type="radio" name="color" value="Rouge"> Rouge</label>
                        <label><input type="radio" name="color" value="Bleu"> Bleu</label>
                    </div>
                    
                    <div class="form-group">
                        <h4>📦 Quantité</h4>
                        <input name="qty" type="number" class="form-control" min="1" value="1">
                    </div>
                    
                    <div class="form-group">
                        <h4>💬 Message</h4>
                        <textarea name="message" class="form-control" rows="3" placeholder="Instructions spéciales..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <h4>📧 Contact</h4>
                        <input name="name" class="form-control" placeholder="Votre nom">
                        <input name="email" type="email" class="form-control" placeholder="email@example.com">
                    </div>
                    
                    <button id="submit" type="button">🚀 Obtenir Devis Instantané</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts actuels -->
    <script src="js/jquery-1.11.1.min.js"></script>
    <script src="js/jsc3d_mod.js"></script>
    <script src="js/object_viewer.js"></script>
    <!-- Ton upload_handler.js actuel ici -->
</body>
</html>
