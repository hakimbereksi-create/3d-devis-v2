<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>HB3D 3D Devis PRO</title>
    
    <!-- 🔥 EMAILJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        emailjs.init("DCpEyOckFUUHGxM_O");
        console.log("EmailJS chargé:", emailjs.version);
    </script>
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <!-- etc... reste identique -->
</head>
<body>

    <!-- Main div -->
    <div id="div" class="container">
        <strong><h1>🚀 HB3D Analyse Volume Calculateur STL</h1></strong>

        <div class="row">
            <div class="col-md-4">
                <div id="stlselector" class="bg-warning">
                    <label for="file"><b>📁 Votre fichier STL:</b></label>
                    <input type="file" name="file" id="file" accept=".stl"/>
                </div>

                <div id="view3d">
                    <canvas id="cv" width="400" height="400"></canvas>
                    <div class="panel panel-info" id="tip">
                        <table class="table">
                            <tr><td>Zoom</td><td><kbd>Wheel</kbd></td></tr>
                            <tr><td>Rotate</td><td><kbd>Drag</kbd></td></tr>
                            <tr><td>Pan</td><td><kbd>Ctrl+Drag</kbd></td></tr>
                        </table>
                    </div>
                    <div id="loading">
                        <img src="css/images/loading.gif" alt="Loading..."/>
                    </div>
                </div>

                <!-- Render controls -->
                <table class="table">
                    <tr>
                        <td><button class="btn btn-default btn-xs" id="info">Interact</button></td>
                        <td>
                            <div class="btn-group dropup pull-right">
                                <button class="btn btn-default btn-xs dropdown-toggle" data-toggle="dropdown">
                                    View <span class="caret"></span>
                                </button>
                                <ul class="dropdown-menu">
                                    <li><a href="#wireframe" class="rendermode">Wireframe</a></li>
                                    <li><a href="#point" class="rendermode">Points</a></li>
                                    <li><a href="#flat" class="rendermode">Filled</a></li>
                                </ul>
                            </div>
                        </td>
                    </tr>
                </table>
            </div>

            <div class="col-md-4">
                <div class="list-group container-fluid">
                    <form id="form" data-netlify="true">

                        <!-- Matériaux -->
                        <div class="list-group-item">
                            <h4>🏭 Matériau</h4>
                            <label class="radio-inline"><input type="radio" name="material" value="ABS"> ABS</label>
                            <label class="radio-inline"><input type="radio" name="material" value="PLA"> PLA</label>
                            <label class="radio-inline"><input type="radio" name="material" value="PETG"> PETG</label>
                            <label class="radio-inline"><input type="radio" name="material" value="Résine"> Résine</label>
                        </div>

                        <!-- Couleur -->
                        <div class="list-group-item">
                            <h4>🎨 Couleur</h4>
                            <label class="radio-inline"><input type="radio" name="color" value="Blanc"> Blanc</label>
                            <label class="radio-inline"><input type="radio" name="color" value="Noir"> Noir</label>
                            <label class="radio-inline"><input type="radio" name="color" value="Rouge"> Rouge</label>
                            <label class="radio-inline"><input type="radio" name="color" value="Bleu"> Bleu</label>
                        </div>

                        <!-- Quantité -->
                        <div class="list-group-item">
                            <h4>📦 Quantité</h4>
                            <input name="qty" type="number" class="form-control" min="1" value="1">
                        </div>

                        <!-- Message -->
                        <div class="list-group-item">
                            <h4>💬 Message</h4>
                            <textarea name="message" id="message" class="form-control" rows="3" maxlength="200" placeholder="Instructions spéciales..."></textarea>
                        </div>

                        <!-- Email + Nom -->
                        <div class="list-group-item list-group-item-info">
                            <h4>📧 Contact</h4>
                            <input name="name" id="name" class="form-control" placeholder="Votre nom">
                            <input name="email" id="email" type="email" class="form-control" placeholder="email@example.com">
                        </div>

                        <!-- Bouton Submit -->
                        <button id="submit" type="button" class="btn btn-success btn-block list-group-item">
                            <h3>🚀 ENVOYER DEVIS <span class="glyphicon glyphicon-send"></span></h3>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/jquery-1.11.1.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jsc3d_mod.js"></script>
    <script src="js/jsc3d.console.js"></script>
    <script src="js/object_viewer.js"></script>
    <script src="js/upload_handler.js"></script>

</body>
</html>
